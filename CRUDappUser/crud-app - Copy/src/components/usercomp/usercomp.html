<div class="container">
  <h2>My Basic CRUD Operations</h2>

  <div style="border: 1px solid #ccc; padding: 20px; width: 300px; margin-bottom: 20px; border-radius: 8px;">
    <label>Name:</label><br />
    <input type="text" [(ngModel)]="user.name" placeholder="Enter name" /><br /><br />
    
    <label>Email:</label><br />
    <input type="email" [(ngModel)]="user.email" placeholder="Enter email" /><br /><br />
    
    <button [ngClass]="isEditMode ? 'btn-update' : 'btn-add'" (click)="saveUser()">
      {{ isEditMode ? 'Update' : 'Add' }} User
    </button>

    @if (isEditMode) {
      <button (click)="resetForm()" style="margin-left: 10px;">Cancel</button>
    }
  </div>

  <hr />

  <table border="1" cellpadding="8" style="width: 100%; border-collapse: collapse; margin-top: 20px;">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (u of users; track u.id) {
        <tr>
          <td>{{ u.id }}</td>
          <td>{{ u.name }}</td>
          <td>{{ u.email }}</td>
          <td>
            <button class="btn-edit" (click)="editUser(u)">Edit</button>
            <button class="btn-delete" (click)="deleteUser(u.id)">Delete</button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4" style="text-align: center;">No users found. Add a user above!</td>
        </tr>
      }
    </tbody>
  </table>
</div>
